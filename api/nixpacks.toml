[variables]
# Pin PHP version; Nixpacks will auto-install required extensions from composer.json
NIXPACKS_PHP_VERSION = "8.2"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = []

[start]
# Config/route/view caches run here so Railway env vars are available when they execute.
# Migrations run before the server starts.
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate:install --no-interaction ; php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
